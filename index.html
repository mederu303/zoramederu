<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zora.mederu.art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    :root{--acc:#22c55e;--bg:#111;--bg2:#1a1a1a;--bg3:#222;--border:rgba(255,255,255,.08);--text:#fff;--text2:#aaa;--text3:#555;--shadow:rgba(0,0,0,.6)}
    .light{--bg:#f5f5f5;--bg2:#fff;--bg3:#ebebeb;--border:rgba(0,0,0,.1);--text:#0a0a0a;--text2:#555;--text3:#999;--shadow:rgba(0,0,0,.12)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
    button{cursor:pointer;font-family:inherit}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
    .znav{height:54px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);transition:background .2s,border-color .2s}
    .znav-logo{display:flex;align-items:center;gap:8px;flex:1}
    .znav-logo span{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
    .znav-zorb{width:22px;height:22px;border-radius:50%;background:conic-gradient(#9b59b6,#3498db,#2ecc71,#f1c40f,#e74c3c,#9b59b6);flex-shrink:0}
    .zbtn{border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;background:var(--bg3);color:var(--text2);transition:all .15s}
    .zbtn:hover{opacity:.8}
    .zbtn-primary{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:600}
    .zbtn-accent{border-color:var(--acc);color:var(--text);background:transparent;font-weight:600;font-size:13px;padding:7px 18px}
    .zbtn-accent.following{background:var(--bg3);border-color:var(--border);color:var(--text3);font-weight:400}
    .zicon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .zicon-btn:hover{color:var(--text);border-color:var(--text2)}
    .zicon-btn.active{color:var(--text);border-color:var(--text2);background:var(--bg2)}
    .wallet-addr{font-family:monospace;font-size:11px;display:flex;align-items:center;gap:6px}
    .wallet-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc)}
    .zhero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;min-height:60vh}
    .zhero h1{font-size:48px;font-weight:700;letter-spacing:-.03em;margin-bottom:16px;line-height:1.1}
    .zhero h1 span{color:var(--acc)}
    .zhero p{font-size:16px;color:var(--text2);max-width:480px;line-height:1.7;margin-bottom:32px}
    .zbtn-large{padding:14px 32px;font-size:15px;font-weight:600;border-radius:10px}
    .zhero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .zbanner{height:150px;background:linear-gradient(135deg,#0d0120 0%,#1a0535 45%,#120028 75%,#080808 100%);position:relative;overflow:visible;z-index:1}
    .light .zbanner{background:linear-gradient(135deg,#e8d5f5 0%,#c8a8e9 45%,#d4b8f0 75%,#ede0f8 100%)}
    .zbanner-orb1{position:absolute;top:10px;right:80px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.15) 0%,transparent 70%)}
    .zbanner-orb2{position:absolute;bottom:-30px;left:35%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(85,51,170,.18) 0%,transparent 70%)}
    .zprofile{padding:0 24px;border-bottom:1px solid var(--border);position:relative;z-index:2;max-width:1200px;margin:0 auto}
    .zprofile-top{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-36px;margin-bottom:14px}
    .zavatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(34,197,94,.6),#5533aa);border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;position:relative;z-index:10;overflow:hidden}
    .zavatar img{width:100%;height:100%;object-fit:cover}
    .zactions{display:flex;gap:8px;align-items:center;padding-bottom:4px;position:relative}
    .ztoast{position:absolute;top:-50px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--text2);white-space:nowrap;font-family:monospace;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
    .ztoast.show{opacity:1}
    .zprofile-body{display:flex;gap:24px;align-items:flex-end;padding-bottom:18px}
    .zprofile-left{flex:1;min-width:0}
    .zprofile-right{flex-shrink:0;width:360px;display:flex;flex-direction:column;gap:5px}
    .zname{font-size:20px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
    .zhandle{font-size:12px;color:var(--text3);font-family:monospace;margin-bottom:9px}
    .zbio{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;max-width:380px}
    .zwebsite{font-size:12px;color:var(--acc)}
    .zstat-box{border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;align-items:center;background:var(--bg2);transition:background .2s,border-color .2s}
    .zstat-div{width:1px;background:var(--border);align-self:stretch;margin:0 11px;flex-shrink:0}
    .zstat-item{display:flex;align-items:baseline;gap:5px;white-space:nowrap}
    .zstat-val{font-size:13px;font-weight:600}
    .zstat-lbl{font-size:10px;color:var(--text3);font-family:monospace}
    .zcoin-delta{font-size:10px;color:var(--acc);font-family:monospace}
    .zbadge{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 7px;font-size:10px;font-family:monospace}
    .zbadge-fc{background:rgba(130,80,255,.15);border:1px solid rgba(130,80,255,.22);color:#9b6fff}
    .zbadge-tw{background:rgba(29,161,242,.12);border:1px solid rgba(29,161,242,.22);color:#4d9fff}
    .ztabs{display:flex;border-bottom:1px solid var(--border);margin:0 -24px;padding-left:24px}
    .ztab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:13px;padding:10px 18px;margin-bottom:-1px;font-weight:400;transition:color .15s}
    .ztab.active{color:var(--text);font-weight:600;border-bottom-color:var(--acc)}
    .ztab:hover{color:var(--text2)}
    .zview-bar{display:flex;align-items:center;gap:8px;padding:10px 24px 4px;max-width:1200px;margin:0 auto}
    .zview-label{font-size:11px;color:var(--text3);font-family:monospace;flex:1}
    .zgrid-wrap{max-width:1200px;margin:0 auto;padding:8px 24px 32px}
    .zgrid{display:grid;gap:12px;align-items:start}
    .zgrid-col{display:flex;flex-direction:column;gap:12px}
    .zcard{border-radius:12px;overflow:hidden;background:var(--bg2);transition:transform .25s,box-shadow .25s,background .2s}
    .zcard.imgonly{background:transparent;border-radius:8px}
    .zcard:hover{transform:translateY(-4px);box-shadow:0 16px 40px var(--shadow)}
    .zcard-img{position:relative;overflow:hidden}
    .zcard-img.square{padding-bottom:100%;height:0}
    .zcard-img.square img,.zcard-img.square .zcard-ph{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
    .zcard-img.natural img,.zcard-img.natural .zcard-ph{width:100%;display:block}
    .zcard-img img{transition:transform .4s}
    .zcard:hover .zcard-img img{transform:scale(1.05)}
    .zcard-ph{background:linear-gradient(135deg,#1a0a2e,#0a1a3e);display:flex;align-items:center;justify-content:center;color:#333;font-size:24px}
    .zcard-ph.natural{height:180px}
    .zcard-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);opacity:0;transition:opacity .22s;display:flex;align-items:center;justify-content:center;gap:8px;flex-direction:column}
    .zcard:hover .zcard-overlay{opacity:1}
    .zcollect{background:var(--acc);color:#000;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600}
    .zcollect:hover{opacity:.9}
    .zlisted-btn{background:rgba(255,255,255,.12);color:#ccc;border:none;border-radius:8px;padding:9px 20px;font-size:13px}
    .zcard-info{padding:11px 13px 13px}
    .zcard.imgonly .zcard-info{display:none}
    .zcard-title{font-size:13px;font-weight:500;margin-bottom:5px;display:flex;justify-content:space-between;align-items:start;gap:6px}
    .zcard-title span{flex:1;line-height:1.3}
    .zchainbadge{font-size:9px;font-family:monospace;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:4px;flex-shrink:0}
    .chain-zora{background:rgba(90,75,220,.18);color:#9b8fff}
    .chain-base{background:rgba(0,82,255,.15);color:#5b9fff}
    .zcard-sub{display:flex;justify-content:space-between;font-size:11px}
    .zcard-col{color:var(--text3);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
    .zcard-price{color:var(--acc);font-family:monospace;font-weight:600}
    .zmodal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .zmodal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:360px;max-width:calc(100vw - 32px)}
    .zmodal h3{font-size:18px;font-weight:700;margin-bottom:20px}
    .zmodal-img{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg3)}
    .zmodal-img img{width:100%;height:100%;object-fit:cover}
    .zmodal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .zmodal-row:last-of-type{border-bottom:none}
    .zmodal-label{color:var(--text3)}
    .zmodal-val{font-weight:600;text-align:right;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .zmodal-btns{display:flex;gap:10px;margin-top:20px}
    .zmodal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600}
    .zbtn-cancel{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
    .zprice-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;margin:12px 0 4px;outline:none;font-family:monospace}
    .zprice-input:focus{border-color:var(--acc)}
    .zstatus{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text2);margin-top:12px;font-family:monospace;min-height:36px;line-height:1.5}
    .zloading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:16px}
    .zspinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .zempty{text-align:center;padding:80px 24px;color:var(--text3);font-size:14px}
    .zedit{position:fixed;right:0;top:0;bottom:0;width:280px;background:var(--bg);border-left:1px solid var(--border);padding:24px;overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .25s ease,background .2s}
    .zedit.open{transform:translateX(0)}
    .zedit-title{font-size:15px;font-weight:600;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center}
    .zedit-close{background:none;border:none;color:var(--text3);font-size:22px;line-height:1}
    .zedit-lbl{font-size:10px;letter-spacing:.1em;color:var(--text3);margin-bottom:7px;text-transform:uppercase;font-family:monospace;display:block}
    .zedit-field{margin-bottom:20px}
    .zedit-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;outline:none}
    .zedit-inp:focus{border-color:var(--acc)}
    .zedit-colors{display:flex;gap:8px;flex-wrap:wrap}
    .zedit-color{width:28px;height:28px;border-radius:50%;border:3px solid transparent;outline:none;transition:transform .15s}
    .zedit-color.active{border-color:var(--text);transform:scale(1.18)}
    @media(max-width:700px){.zprofile-body{flex-direction:column;align-items:stretch}.zprofile-right{width:100%}.znav,.zprofile,.zgrid-wrap,.zview-bar{padding-left:16px;padding-right:16px}.zhero h1{font-size:32px}}
  </style>
</head>
<body>

<nav class="znav">
  <div class="znav-logo"><div class="znav-zorb"></div><span>zora.mederu.art</span></div>
  <button class="zbtn" id="editBtn" style="display:none">✦ 編集</button>
  <button class="zicon-btn" id="themeBtn" title="ダーク/ライト">
    <svg id="iconMoon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>
    <svg id="iconSun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
  </button>
  <button class="zbtn zbtn-primary" id="connectBtn">ウォレット接続</button>
  <button class="zbtn wallet-addr" id="disconnectBtn" style="display:none">
    <span class="wallet-dot"></span><span id="walletLabel">0x...</span>
  </button>
</nav>

<!-- HERO -->
<div id="heroSection">
  <div class="zbanner"><div class="zbanner-orb1"></div><div class="zbanner-orb2"></div></div>
  <div class="zhero">
    <h1>古いZora作品を<br><span>もう一度</span></h1>
    <p>Zora NetworkとBaseの古いNFTコントラクトに対応。ウォレットを接続して、あなたのコレクションを表示・販売・2次流通させましょう。</p>
    <div class="zhero-btns">
      <button class="zbtn zbtn-primary zbtn-large" id="connectBtnHero">ウォレットを接続</button>
    </div>
  </div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none">
  <div class="zbanner"><div class="zbanner-orb1"></div><div class="zbanner-orb2"></div></div>
  <div class="zprofile">
    <div class="zprofile-top">
      <div class="zavatar" id="avatarEl"><span id="avatarText">??</span></div>
      <div class="zactions">
        <div class="ztoast" id="toast"></div>
        <button class="zbtn zbtn-accent" id="followBtn" style="display:none">Follow</button>
        <button class="zbtn" style="padding:7px 13px;font-size:16px">···</button>
      </div>
    </div>
    <div class="zprofile-body">
      <div class="zprofile-left">
        <div class="zname" id="nameEl">—</div>
        <div class="zhandle">@<span id="handleEl">—</span></div>
        <div class="zbio" id="bioEl"></div>
        <a class="zwebsite" id="websiteEl" href="#" target="_blank"></a>
      </div>
      <div class="zprofile-right">
        <div class="zstat-box">
          <div class="zstat-item"><span class="zstat-val" id="coinVal">—</span><span class="zcoin-delta" id="coinDelta"></span><span class="zstat-lbl">creator coin</span></div>
          <div class="zstat-div"></div>
          <div class="zstat-item"><span class="zstat-val" id="holdersVal">—</span><span class="zstat-lbl">holders</span></div>
          <div class="zstat-div"></div>
          <div class="zstat-item"><span class="zstat-val" id="holdingsVal">—</span><span class="zstat-lbl">holdings</span></div>
        </div>
        <div class="zstat-box">
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <div class="zstat-item"><span class="zstat-val" id="followerCount">—</span><span class="zstat-lbl">followers</span></div>
            <span class="zbadge zbadge-fc" id="fcBadge" style="display:none">⬡ —</span>
            <span class="zbadge zbadge-tw" id="twBadge" style="display:none">𝕏 —</span>
          </div>
          <div class="zstat-div"></div>
          <div class="zstat-item"><span class="zstat-val" id="followingCount">—</span><span class="zstat-lbl">following</span></div>
        </div>
      </div>
    </div>
    <div class="ztabs">
      <button class="ztab active" data-tab="all">All NFTs</button>
      <button class="ztab" data-tab="zora">Zora Network</button>
      <button class="ztab" data-tab="base">Base</button>
      <button class="ztab" data-tab="listed">出品中</button>
    </div>
  </div>
</div>

<div class="zview-bar" id="viewBar" style="display:none">
  <span class="zview-label" id="viewLabel">—</span>
  <div style="display:flex;gap:6px">
    <button class="zicon-btn" id="ratioBtn" title="正方形/実比率">
      <svg id="icoSq" width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor"/></svg>
      <svg id="icoNat" width="14" height="14" viewBox="0 0 16 16" fill="none" style="display:none"><rect x="1" y="3" width="6" height="10" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="5" rx="1" fill="currentColor"/><rect x="9" y="8" width="6" height="7" rx="1" fill="currentColor"/></svg>
    </button>
    <button class="zicon-btn" id="imgOnlyBtn" title="画像のみ">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="4" height="4" rx=".8" fill="currentColor"/><rect x="6" y="1" width="4" height="4" rx=".8" fill="currentColor"/><rect x="11" y="1" width="4" height="4" rx=".8" fill="currentColor"/><rect x="1" y="6" width="4" height="4" rx=".8" fill="currentColor"/><rect x="6" y="6" width="4" height="4" rx=".8" fill="currentColor"/><rect x="11" y="6" width="4" height="4" rx=".8" fill="currentColor"/><rect x="1" y="11" width="4" height="4" rx=".8" fill="currentColor"/><rect x="6" y="11" width="4" height="4" rx=".8" fill="currentColor"/><rect x="11" y="11" width="4" height="4" rx=".8" fill="currentColor"/></svg>
    </button>
  </div>
</div>
<div class="zgrid-wrap" id="gridWrap" style="display:none">
  <div class="zgrid" id="gridEl" style="grid-template-columns:repeat(3,minmax(0,1fr))"></div>
</div>

<!-- BUY MODAL -->
<div class="zmodal-bg" id="buyModal" style="display:none">
  <div class="zmodal">
    <h3>作品を購入</h3>
    <div class="zmodal-img"><img id="modalImg" src="" alt=""></div>
    <div class="zmodal-row"><span class="zmodal-label">作品名</span><span class="zmodal-val" id="modalName">—</span></div>
    <div class="zmodal-row"><span class="zmodal-label">価格</span><span class="zmodal-val" id="modalPrice">—</span></div>
    <div class="zmodal-row"><span class="zmodal-label">チェーン</span><span class="zmodal-val" id="modalChain">—</span></div>
    <div class="zstatus" id="buyStatus">購入ボタンを押すとウォレットで確認してください</div>
    <div class="zmodal-btns">
      <button class="zbtn-cancel zbtn" id="buyCancel">キャンセル</button>
      <button class="zcollect" id="buyConfirm">購入する</button>
    </div>
  </div>
</div>

<!-- LIST MODAL -->
<div class="zmodal-bg" id="listModal" style="display:none">
  <div class="zmodal">
    <h3>出品する</h3>
    <div class="zmodal-img"><img id="listModalImg" src="" alt=""></div>
    <div class="zmodal-row"><span class="zmodal-label">作品名</span><span class="zmodal-val" id="listModalName">—</span></div>
    <label class="zedit-lbl" style="margin-top:12px">価格 (ETH)</label>
    <input class="zprice-input" id="priceInput" type="number" step="0.001" min="0.001" placeholder="0.05">
    <div class="zstatus" id="listStatus">価格を入力して出品してください</div>
    <div class="zmodal-btns">
      <button class="zbtn-cancel zbtn" id="listCancel">キャンセル</button>
      <button class="zcollect" id="listConfirm">OpenSeaで出品 →</button>
    </div>
  </div>
</div>

<!-- EDIT PANEL -->
<div class="zedit" id="editPanel">
  <div class="zedit-title">設定<button class="zedit-close" id="editClose">×</button></div>
  <div class="zedit-field"><label class="zedit-lbl">表示名</label><input class="zedit-inp" id="inputName"></div>
  <div class="zedit-field"><label class="zedit-lbl">プロフィール</label><textarea class="zedit-inp" id="inputBio" rows="3" style="resize:none;line-height:1.5"></textarea></div>
  <div class="zedit-field"><label class="zedit-lbl">ウェブサイト</label><input class="zedit-inp" id="inputWeb"></div>
  <div class="zedit-field">
    <label class="zedit-lbl">アクセントカラー</label>
    <div class="zedit-colors" id="colorPicker">
      <button class="zedit-color active" style="background:#22c55e" data-color="#22c55e"></button>
      <button class="zedit-color" style="background:#ec4899" data-color="#ec4899"></button>
      <button class="zedit-color" style="background:#f59e0b" data-color="#f59e0b"></button>
      <button class="zedit-color" style="background:#3b82f6" data-color="#3b82f6"></button>
      <button class="zedit-color" style="background:#a855f7" data-color="#a855f7"></button>
      <button class="zedit-color" style="background:#06b6d4" data-color="#06b6d4"></button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
let wallet=null,isOwner=false,isFollowing=false,followerCount=0;
let ratio='square',imgOnly=false,isDark=true,accent='#22c55e';
let allNFTs={all:[],zora:[],base:[],listed:[]},currentNFT=null;

function fmt(n){if(!n&&n!==0)return'—';n=Number(n);return n>=1000?(n/1000).toFixed(1)+'K':String(n);}
function shortAddr(a){return a.slice(0,6)+'...'+a.slice(-4);}
function showToast(msg,dur=3000){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function setStatus(id,msg){$(id).textContent=msg;}
function setAccent(c){accent=c;document.documentElement.style.setProperty('--acc',c);$('avatarEl').style.background=`linear-gradient(135deg,${c}88,#5533aa)`;if(!isFollowing)$('followBtn').style.borderColor=c;document.querySelectorAll('.zedit-color').forEach(b=>b.classList.toggle('active',b.dataset.color===c));}

// API — Vercelプロキシ経由（CORS回避）
async function fetchNFTs(addr,chain){
  const base=chain==='zora'?'/api/zora':'/api/base';
  try{
    const r=await fetch(`${base}/users/${addr}/tokens/v7?limit=100&includeTopBid=true`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    return(d.tokens||[]).map(t=>({
      id:t.token.tokenId,name:t.token.name||`#${t.token.tokenId}`,
      collection:t.token.collection?.name||'',image:t.token.imageSmall||t.token.image||null,
      chain,price:t.market?.floorAsk?.price?.amount?.decimal||null,
      listed:!!t.market?.floorAsk?.price,contract:t.token.contract,tokenId:t.token.tokenId,
    }));
  }catch(e){console.warn('fetchNFTs',chain,e.message);return[];}
}

async function fetchZoraProfile(id){
  try{
    const r=await fetch('https://api.zora.co/graphql',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:`{profile(identifier:"${id}"){displayName bio website avatar{medium}socialAccounts{farcaster{followerCount}twitter{followerCount}}creatorCoin{marketCap marketCapDelta24h}}}`})});
    const d=await r.json();return d?.data?.profile||null;
  }catch(e){return null;}
}

// Reservoir Execute Buy
async function executeBuy(nft){
  setStatus('buyStatus','🔄 購入情報を取得中...');$('buyConfirm').disabled=true;
  try{
    const base=nft.chain==='zora'?'/api/zora':'/api/base';
    const res=await fetch(`${base}/execute/buy/v7`,{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({items:[{token:`${nft.contract}:${nft.tokenId}`,quantity:1}],taker:wallet,source:'zora.mederu.art'})});
    const data=await res.json();
    if(data.errors?.length){setStatus('buyStatus','❌ '+data.errors[0].message);$('buyConfirm').disabled=false;return;}
    const provider=new ethers.BrowserProvider(window.ethereum);
    const signer=await provider.getSigner();
    for(const step of(data.steps||[])){
      for(const item of(step.items||[])){
        if(item.status==='incomplete'&&item.data){
          setStatus('buyStatus',`🔄 ${step.action}...`);
          try{const tx=await signer.sendTransaction(item.data);setStatus('buyStatus','⏳ 送信中...');await tx.wait();setStatus('buyStatus','✅ 購入完了！');showToast('🎉 購入完了！');setTimeout(()=>closeBuyModal(),2000);}
          catch(e){setStatus('buyStatus','❌ '+(e.reason||e.message));$('buyConfirm').disabled=false;return;}
        }
      }
    }
  }catch(e){setStatus('buyStatus','❌ '+e.message);$('buyConfirm').disabled=false;}
}

function applyProfile(p,addr){
  const name=p?.displayName||shortAddr(addr),handle=p?.handle||shortAddr(addr);
  $('nameEl').textContent=name;$('handleEl').textContent=handle;$('avatarText').textContent=name.slice(0,2).toUpperCase();
  if(p?.bio)$('bioEl').innerHTML=p.bio.replace(/\n/g,'<br>');
  if(p?.website){$('websiteEl').textContent='🔗 '+p.website;$('websiteEl').href=p.website.startsWith('http')?p.website:'https://'+p.website;}
  if(p?.avatar?.medium)$('avatarEl').innerHTML=`<img src="${p.avatar.medium}" alt="avatar">`;
  if(p?.creatorCoin?.marketCap){$('coinVal').textContent='$'+fmt(Number(p.creatorCoin.marketCap));const d=p.creatorCoin.marketCapDelta24h;if(d){$('coinDelta').textContent=(Number(d)>0?'+':'')+Number(d).toFixed(1)+'%';$('coinDelta').style.color=Number(d)>=0?'var(--acc)':'#ef4444';}}
  if(p?.socialAccounts?.farcaster?.followerCount){followerCount=p.socialAccounts.farcaster.followerCount;$('followerCount').textContent=fmt(followerCount);$('fcBadge').textContent='⬡ '+fmt(followerCount);$('fcBadge').style.display='';}
  if(p?.socialAccounts?.twitter?.followerCount){$('twBadge').textContent='𝕏 '+fmt(p.socialAccounts.twitter.followerCount);$('twBadge').style.display='';}
  $('inputName').value=name;$('inputBio').value=p?.bio||'';$('inputWeb').value=p?.website||'';
}

function card(nft){
  const sq=ratio==='square',cc=nft.chain==='zora'?'chain-zora':'chain-base',cl=nft.chain==='zora'?'ZORA':'BASE';
  const img=nft.image?`<img src="${nft.image}" alt="${nft.name.replace(/"/g,'')}" loading="lazy">`:`<div class="zcard-ph${sq?'':' natural'}">◻</div>`;
  const nftJson=encodeURIComponent(JSON.stringify(nft));
  let overlay='';
  if(isOwner){overlay=nft.listed?`<button class="zlisted-btn" onclick="openListModal('${nftJson}')">出品中 · 変更</button>`:`<button class="zcollect" onclick="openListModal('${nftJson}')">出品する</button>`;}
  else{overlay=nft.listed&&nft.price?`<button class="zcollect" onclick="openBuyModal('${nftJson}')">Collect · ${Number(nft.price).toFixed(4)} Ξ</button>`:`<span style="font-size:12px;color:#777;font-family:monospace">not listed</span>`;}
  const imgWrap=`<div class="zcard-img ${sq?'square':'natural'}">${img}<div class="zcard-overlay">${overlay}</div></div>`;
  const info=imgOnly?'':`<div class="zcard-info"><div class="zcard-title"><span>${nft.name}</span><span class="zchainbadge ${cc}">${cl}</span></div><div class="zcard-sub"><span class="zcard-col">${nft.collection}</span>${nft.price?`<span class="zcard-price">${Number(nft.price).toFixed(4)} Ξ</span>`:''}</div></div>`;
  return`<div class="zcard${imgOnly?' imgonly':''}">${imgWrap}${info}</div>`;
}

function renderGrid(tab){
  const items=allNFTs[tab]||[],g=$('gridEl'),cols=imgOnly?4:3;
  g.style.gridTemplateColumns=`repeat(${cols},minmax(0,1fr))`;
  $('viewLabel').textContent=`${items.length} items`;
  if(!items.length){g.innerHTML='<div class="zempty">作品がありません</div>';return;}
  g.innerHTML=Array.from({length:cols},(_,ci)=>items.filter((_,i)=>i%cols===ci)).map(col=>`<div class="zgrid-col">${col.map(n=>card(n)).join('')}</div>`).join('');
}

function ct(){return document.querySelector('.ztab.active')?.dataset.tab||'all';}

function openBuyModal(raw){currentNFT=typeof raw==='string'?JSON.parse(decodeURIComponent(raw)):raw;$('modalImg').src=currentNFT.image||'';$('modalName').textContent=currentNFT.name;$('modalPrice').textContent=currentNFT.price?Number(currentNFT.price).toFixed(4)+' ETH':'—';$('modalChain').textContent=currentNFT.chain==='zora'?'Zora Network':'Base';setStatus('buyStatus','購入ボタンを押すとウォレットで確認してください');$('buyConfirm').disabled=false;$('buyModal').style.display='flex';}
function closeBuyModal(){$('buyModal').style.display='none';currentNFT=null;}
function openListModal(raw){currentNFT=typeof raw==='string'?JSON.parse(decodeURIComponent(raw)):raw;$('listModalImg').src=currentNFT.image||'';$('listModalName').textContent=currentNFT.name;$('priceInput').value=currentNFT.price||'';setStatus('listStatus',currentNFT.listed?`現在 ${Number(currentNFT.price).toFixed(4)} ETH で出品中`:'価格を入力して出品してください');$('listModal').style.display='flex';}
function closeListModal(){$('listModal').style.display='none';currentNFT=null;}

async function connectWallet(){
  if(!window.ethereum){alert('MetaMaskをインストールしてください。\nhttps://metamask.io');return;}
  try{
    const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
    wallet=accounts[0];isOwner=true;
    $('connectBtn').style.display='none';$('disconnectBtn').style.display='';$('walletLabel').textContent=shortAddr(wallet);
    $('editBtn').style.display='';$('heroSection').style.display='none';$('profileSection').style.display='';
    $('viewBar').style.display='flex';$('gridWrap').style.display='';
    $('gridEl').innerHTML='<div class="zloading"><div class="zspinner"></div><p style="color:var(--text3);font-size:13px">NFTを読み込み中...</p></div>';
    const[zoraT,baseT,profile]=await Promise.all([fetchNFTs(wallet,'zora'),fetchNFTs(wallet,'base'),fetchZoraProfile(wallet)]);
    applyProfile(profile,wallet);
    const all=[...zoraT,...baseT];
    allNFTs={all,zora:zoraT,base:baseT,listed:all.filter(n=>n.listed)};
    document.querySelector('[data-tab="all"]').textContent=`All NFTs (${all.length})`;
    document.querySelector('[data-tab="zora"]').textContent=`Zora Network (${zoraT.length})`;
    document.querySelector('[data-tab="base"]').textContent=`Base (${baseT.length})`;
    document.querySelector('[data-tab="listed"]').textContent=`出品中 (${allNFTs.listed.length})`;
    renderGrid(ct());
  }catch(e){if(e.code!==4001)console.error(e);}
}

function disconnectWallet(){wallet=null;isOwner=false;$('connectBtn').style.display='';$('disconnectBtn').style.display='none';$('editBtn').style.display='none';$('heroSection').style.display='';$('profileSection').style.display='none';$('viewBar').style.display='none';$('gridWrap').style.display='none';}

$('connectBtn').addEventListener('click',connectWallet);
$('connectBtnHero').addEventListener('click',connectWallet);
$('disconnectBtn').addEventListener('click',disconnectWallet);
$('themeBtn').addEventListener('click',function(){isDark=!isDark;document.body.classList.toggle('light',!isDark);$('iconMoon').style.display=isDark?'block':'none';$('iconSun').style.display=isDark?'none':'block';});
$('ratioBtn').addEventListener('click',function(){ratio=ratio==='square'?'natural':'square';$('icoSq').style.display=ratio==='square'?'block':'none';$('icoNat').style.display=ratio==='natural'?'block':'none';this.classList.toggle('active',ratio==='natural');renderGrid(ct());});
$('imgOnlyBtn').addEventListener('click',function(){imgOnly=!imgOnly;this.classList.toggle('active',imgOnly);renderGrid(ct());});
document.querySelectorAll('.ztab').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.ztab').forEach(x=>x.classList.remove('active'));this.classList.add('active');renderGrid(this.dataset.tab);}));
$('followBtn').addEventListener('click',function(){isFollowing=!isFollowing;this.textContent=isFollowing?'Following':'Follow';this.classList.toggle('following',isFollowing);showToast(isFollowing?'✓ フォローしました':'フォロー解除しました');});
$('buyCancel').addEventListener('click',closeBuyModal);$('buyModal').addEventListener('click',e=>{if(e.target===$('buyModal'))closeBuyModal();});
$('buyConfirm').addEventListener('click',()=>{if(currentNFT)executeBuy(currentNFT);});
$('listCancel').addEventListener('click',closeListModal);$('listModal').addEventListener('click',e=>{if(e.target===$('listModal'))closeListModal();});
$('listConfirm').addEventListener('click',()=>{if(!currentNFT)return;const u=`https://opensea.io/assets/${currentNFT.chain==='zora'?'zora':'base'}/${currentNFT.contract}/${currentNFT.tokenId}`;window.open(u,'_blank');closeListModal();});
$('editBtn').addEventListener('click',()=>$('editPanel').classList.toggle('open'));
$('editClose').addEventListener('click',()=>$('editPanel').classList.remove('open'));
$('inputName').addEventListener('input',function(){$('nameEl').textContent=this.value;$('avatarText').textContent=this.value.slice(0,2).toUpperCase();});
$('inputBio').addEventListener('input',function(){$('bioEl').innerHTML=this.value.replace(/\n/g,'<br>');});
$('inputWeb').addEventListener('input',function(){$('websiteEl').textContent='🔗 '+this.value;});
document.querySelectorAll('.zedit-color').forEach(b=>b.addEventListener('click',function(){setAccent(this.dataset.color);}));
if(window.ethereum)window.ethereum.on('accountsChanged',a=>{if(a.length===0)disconnectWallet();});
document.documentElement.style.setProperty('--acc',accent);
</script>
</body>
</html>
